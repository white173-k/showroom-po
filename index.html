<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom POS System</title>
    <!-- Tailwind CSS for Modern UI -->
    <script src="https://jsdelivr.net"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-gray-800 p-4 shadow-md flex justify-between items-center border-b border-gray-700">
        <h1 class="text-2xl font-bold text-indigo-400">👔 Premium Apparel POS</h1>
        <button onclick="toggleAdminModal()" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded text-sm font-semibold">⚙️ Manage Inventory</button>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Left: Product Catalog -->
        <section class="w-2/3 p-6 overflow-y-auto border-r border-gray-800">
            <div class="flex gap-4 mb-6">
                <input type="text" id="searchBar" oninput="renderProducts()" placeholder="Search clothes..." class="flex-1 bg-gray-800 border border-gray-700 p-2 rounded focus:outline-none focus:border-indigo-500">
                <select id="filterCategory" onchange="renderProducts()" class="bg-gray-800 border border-gray-700 p-2 rounded">
                    <option value="all">All Items</option>
                    <option value="Shirt">Shirts</option>
                    <option value="Pant">Pants</option>
                </select>
            </div>
            
            <div id="productGrid" class="grid grid-cols-3 gap-4">
                <!-- Products will be injected here by JS -->
            </div>
        </section>

        <!-- Right: Billing & Cart -->
        <section class="w-1/3 bg-gray-800 p-6 flex flex-col justify-between shadow-xl">
            <div>
                <h2 class="text-xl font-bold mb-4 pb-2 border-b border-gray-700 flex justify-between">
                    <span>Current Order</span>
                    <span id="cartCount" class="text-sm bg-indigo-600 px-2 py-0.5 rounded-full">0</span>
                </h2>
                <div id="cartItems" class="space-y-3 overflow-y-auto max-h-[50vh]">
                    <!-- Cart items injected here -->
                    <p class="text-gray-500 text-center py-8">Cart is empty</p>
                </div>
            </div>

            <!-- Billing Calculations -->
            <div class="border-t border-gray-700 pt-4 mt-4 space-y-2 text-sm">
                <div class="flex justify-between"><span>Subtotal:</span><span id="subtotal">₹0.00</span></div>
                <div class="flex justify-between text-gray-400"><span>GST (18%):</span><span id="gst">₹0.00</span></div>
                <div class="flex justify-between items-center text-gray-400">
                    <span>Discount (₹):</span>
                    <input type="number" id="discountInput" value="0" oninput="calculateTotals()" class="w-20 bg-gray-700 border border-gray-600 rounded text-center p-1 text-white">
                </div>
                <div class="flex justify-between text-xl font-bold text-indigo-400 border-t border-gray-700 pt-2 mt-2">
                    <span>Total Pay:</span><span id="finalTotal">₹0.00</span>
                </div>
                <button onclick="checkout()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-3 rounded-lg font-bold text-lg mt-4 transition-colors">🛒 Complete & Print Bill</button>
            </div>
        </section>
    </main>

    <!-- Invoice Print Modal (Hidden by default) -->
    <div id="printArea" class="hidden bg-white text-black p-8 max-w-sm mx-auto my-4 border rounded shadow"></div>

    <!-- Admin / Inventory Modal -->
    <div id="adminModal" class="fixed inset-0 bg-black/70 flex items-center justify-center hidden p-4">
        <div class="bg-gray-800 p-6 rounded-lg max-w-md w-full border border-gray-700">
            <h3 class="text-lg font-bold mb-4 text-indigo-400">Add New Clothing Item</h3>
            <div class="space-y-3">
                <input type="text" id="pName" placeholder="Item Name (e.g., Slim Fit Chinos)" class="w-full bg-gray-700 p-2 rounded">
                <select id="pCategory" class="w-full bg-gray-700 p-2 rounded">
                    <option value="Shirt">Shirt</option>
                    <option value="Pant">Pant</option>
                </select>
                <input type="number" id="pPrice" placeholder="Price (₹)" class="w-full bg-gray-700 p-2 rounded">
                <input type="number" id="pStock" placeholder="Stock Quantity" class="w-full bg-gray-700 p-2 rounded">
                <div class="flex gap-2 justify-end pt-2">
                    <button onclick="toggleAdminModal()" class="bg-gray-600 px-4 py-2 rounded">Cancel</button>
                    <button onclick="addNewProduct()" class="bg-indigo-600 px-4 py-2 rounded font-bold">Add Item</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // Sample Initial Data if localStorage is empty
        let defaultProducts = [
            { id: 1, name: "Casual Linen Shirt", category: "Shirt", price: 1299, stock: 15 },
            { id: 2, name: "Formal White Shirt", category: "Shirt", price: 1499, stock: 20 },
            { id: 3, name: "Slim Fit Denim Jeans", category: "Pant", price: 2499, stock: 12 },
            { id: 4, name: "Formal Black Trousers", category: "Pant", price: 1899, stock: 8 }
        ];

        let products = JSON.parse(localStorage.getItem('showroom_inventory')) || defaultProducts;
        let cart = [];

        function saveToStorage() {
            localStorage.setItem('showroom_inventory', JSON.stringify(products));
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            const search = document.getElementById('searchBar').value.toLowerCase();
            const filter = document.getElementById('filterCategory').value;

            grid.innerHTML = '';
            
            products.forEach(p => {
                if (filter !== 'all' && p.category !== filter) return;
                if (!p.name.toLowerCase().includes(search)) return;

                grid.innerHTML += `
                    <div class="bg-gray-800 border border-gray-700 p-4 rounded-xl shadow hover:border-indigo-500 transition-all flex flex-col justify-between">
                        <div>
                            <span class="text-xs font-semibold px-2 py-0.5 rounded ${p.category === 'Shirt' ? 'bg-teal-900 text-teal-300' : 'bg-blue-900 text-blue-300'}">${p.category}</span>
                            <h3 class="font-bold text-lg mt-2">${p.name}</h3>
                            <p class="text-gray-400 font-semibold mt-1">₹${p.price}</p>
                        </div>
                        <div class="mt-4 flex justify-between items-center">
                            <span class="text-xs text-gray-500">Stock: ${p.stock} pcs</span>
                            <button onclick="addToCart(${p.id})" ${p.stock === 0 ? 'disabled class="bg-gray-700 text-gray-500 px-3 py-1.5 rounded text-xs"' : 'class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded text-xs font-bold"'}>
                                ${p.stock === 0 ? 'Out of Stock' : '+ Add'}
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (product.stock <= 0) return;

            const cartItem = cart.find(item => item.id === id);
            if (cartItem) {
                if(cartItem.qty < product.stock) cartItem.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            renderCart();
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            const prod = products.find(p => p.id === id);
            item.qty += delta;
            if(item.qty > prod.stock) item.qty = prod.stock;
            if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            document.getElementById('cartCount').innerText = cart.reduce((acc, i) => acc + i.qty, 0);
            
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8">Cart is empty</p>';
                calculateTotals();
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="flex justify-between items-center bg-gray-700/50 p-3 rounded-lg border border-gray-700">
                    <div class="flex-1 pr-2">
                        <h4 class="font-medium text-sm truncate">${item.name}</h4>
                        <span class="text-xs text-indigo-300">₹${item.price}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeQty(${item.id}, -1)" class="bg-gray-600 hover:bg-gray-500 w-6 h-6 rounded flex items-center justify-center font-bold">-</button>
                        <span class="text-sm font-semibold w-6 text-center">${item.qty}</span>
                        <button onclick="changeQty(${item.id}, 1)" class="bg-gray-600 hover:bg-gray-500 w-6 h-6 rounded flex items-center justify-center font-bold">+</button>
                    </div>
                </div>
            `).join('');
